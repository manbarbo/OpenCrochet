services:
  web:
    build:
      context: .
      dockerfile: ./apps/web/Dockerfile
    expose:
      - "80"
    restart: unless-stopped
    networks:
      - opencrochet-network

  api:
    build:
      context: .
      dockerfile: ./apps/api/Dockerfile
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - LOG_LEVEL=info
    restart: unless-stopped
    networks:
      - opencrochet-network

  nginx:
    image: nginx:alpine
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - web
      - api
    restart: unless-stopped
    networks:
      - opencrochet-network

networks:
  opencrochet-network:
    driver: bridge
